name: Mobile tests

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
    paths:
      - 'mobile/**'
      - '.github/workflows/mobile-tests.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            mobile:
              - 'mobile/**'
              - '.github/workflows/mobile-tests.yml'
      - uses: actions/setup-node@v4
        if: steps.changes.outputs.mobile == 'true'
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: mobile/package-lock.json
      - if: steps.changes.outputs.mobile == 'true'
        run: npm ci
      - if: steps.changes.outputs.mobile == 'true'
        run: npm test
      - if: steps.changes.outputs.mobile != 'true'
        run: echo "No mobile changes detected; skipping mobile tests."
        working-directory: .
