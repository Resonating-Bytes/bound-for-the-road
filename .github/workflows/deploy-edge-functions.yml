name: Deploy Supabase Edge Functions

on:
  push:
    branches:
      - main
    paths:
      - 'supabase/functions/**'
      - '.github/workflows/deploy-edge-functions.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.repository == 'Resonating-Bytes/bound-for-the-road'
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Verify deploy secrets
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "::error::SUPABASE_ACCESS_TOKEN is empty. Add a Supabase personal access token (Account → Access Tokens), not the anon or service_role API key."
            exit 1
          fi
          if [ -z "$SUPABASE_PROJECT_REF" ]; then
            echo "::error::SUPABASE_PROJECT_REF is empty. Use Project Settings → General → Project ID (20-char id from the dashboard URL)."
            exit 1
          fi
          if [ "${#SUPABASE_PROJECT_REF}" -lt 10 ]; then
            echo "::error::SUPABASE_PROJECT_REF looks too short (${#SUPABASE_PROJECT_REF} chars). Use the Project ID from the dashboard URL, not a UUID from elsewhere."
            exit 1
          fi
          echo "Deploy secrets present (values not printed)."

      - name: Deploy send-approval-push
        run: supabase functions deploy send-approval-push --project-ref "$SUPABASE_PROJECT_REF" --debug
