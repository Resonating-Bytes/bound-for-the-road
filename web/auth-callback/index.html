<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bound for the Road</title>
    <style>
      :root {
        color-scheme: light;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        line-height: 1.5;
        color: #1a2b3c;
        background: #f8fafc;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }
      main {
        max-width: 420px;
        background: #fff;
        border: 1px solid #e2e8f0;
        border-radius: 12px;
        padding: 28px 24px;
        box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
      }
      h1 {
        margin: 0 0 8px;
        font-size: 1.35rem;
      }
      p {
        margin: 0 0 16px;
        color: #5a6b7c;
      }
      a.button {
        display: inline-block;
        margin-top: 8px;
        padding: 12px 16px;
        border-radius: 10px;
        background: #2563eb;
        color: #fff;
        text-decoration: none;
        font-weight: 600;
      }
      .note {
        font-size: 0.9rem;
        color: #64748b;
      }
    </style>
  </head>
  <body>
    <main id="content">
      <h1>Opening Bound for the Road…</h1>
      <p>If nothing happens, open the app on your phone and sign in.</p>
    </main>
    <script>
      (function () {
        var pageParams = new URLSearchParams(window.location.search);
        var hashParams = new URLSearchParams(window.location.hash.replace(/^#/, ''));
        var appRedirect = sanitizeAppRedirect(pageParams.get('app_redirect'));
        pageParams.delete('app_redirect');

        var authParams = new URLSearchParams();
        pageParams.forEach(function (value, key) {
          authParams.set(key, value);
        });
        hashParams.forEach(function (value, key) {
          authParams.set(key, value);
        });

        var errorCode = authParams.get('error_code') || authParams.get('error') || '';
        var description = (authParams.get('error_description') || '').toLowerCase();
        var alreadyUsed =
          errorCode === 'otp_expired' ||
          description.indexOf('invalid or has expired') >= 0 ||
          description.indexOf('expired') >= 0;

        var hasTokens =
          authParams.has('code') ||
          authParams.has('access_token') ||
          authParams.has('token_hash');

        if (alreadyUsed) {
          showAlreadyUsed(authParams.get('type') === 'recovery', appRedirect);
          return;
        }

        if (hasTokens && appRedirect) {
          window.location.replace(appendParams(appRedirect, authParams));
          return;
        }

        if (appRedirect) {
          showOpenApp(appRedirect);
          return;
        }

        showGeneric();
      })();

      function sanitizeAppRedirect(url) {
        if (!url) return null;
        try {
          var parsed = new URL(url);
          if (parsed.protocol === 'exp:' || parsed.protocol === 'boundfortheroad:') {
            return url;
          }
        } catch (e) {
          return null;
        }
        return null;
      }

      function appendParams(base, params) {
        var qs = params.toString();
        if (!qs) return base;
        return base + (base.indexOf('?') >= 0 ? '&' : '?') + qs;
      }

      function cleanAppOpenUrl(appRedirect) {
        if (!appRedirect) return null;
        var q = appRedirect.indexOf('?');
        var root = q >= 0 ? appRedirect.slice(0, q) : appRedirect;
        return root + '?auth_callback=1';
      }

      function showAlreadyUsed(isRecovery, appRedirect) {
        var openUrl = cleanAppOpenUrl(appRedirect);
        document.getElementById('content').innerHTML =
          (isRecovery
            ? '<h1>Reset link expired</h1>' +
              '<p>This password reset link was already used or has expired.</p>'
            : '<h1>Email already confirmed</h1>' +
              '<p>This link was already used (for example on another device). Your account should be ready.</p>') +
          (openUrl
            ? '<a class="button" href="' +
              encodeURI(openUrl) +
              '">Open Bound for the Road</a>' +
              '<p class="note">Then sign in with your email and password.</p>'
            : '<p class="note">Open Bound for the Road on your phone and sign in.</p>');
      }

      function showOpenApp(appRedirect) {
        var openUrl = cleanAppOpenUrl(appRedirect) || appRedirect;
        document.getElementById('content').innerHTML =
          '<h1>Continue in the app</h1>' +
          '<p>Tap below to open Bound for the Road and finish signing in.</p>' +
          '<a class="button" href="' +
          encodeURI(openUrl) +
          '">Open Bound for the Road</a>';
        window.location.replace(openUrl);
      }

      function showGeneric() {
        document.getElementById('content').innerHTML =
          '<h1>Bound for the Road</h1>' +
          '<p>Open the app on your phone and sign in to continue.</p>';
      }
    </script>
  </body>
</html>
